<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Widget Editor V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
        .editor-panel {
            background: white;
            border-right: 1px solid #e5e7eb;
            height: 100vh;
            overflow-y: auto;
        }
        .preview-panel {
            background: #111827;
            height: 100vh;
            overflow-y: auto;
        }
        .widget-only-view {
            display: none;
            background: #111827;
            min-height: 100vh;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        input[type="color"] {
            width: 4rem;
            height: 2.5rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            cursor: pointer;
        }
        input[type="range"] {
            width: 100%;
            height: 0.5rem;
            background: #e5e7eb;
            border-radius: 9999px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            background: #8b5cf6;
            border-radius: 9999px;
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 1.25rem;
            height: 1.25rem;
            background: #8b5cf6;
            border-radius: 9999px;
            cursor: pointer;
            border: none;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.25rem;
        }
        .field-group {
            margin-bottom: 1.25rem;
        }
        .toggle-checkbox {
            appearance: none;
            width: 2.75rem;
            height: 1.5rem;
            background: #d1d5db;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-checkbox:checked {
            background: #8b5cf6;
        }
        .toggle-checkbox::after {
            content: '';
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            background: white;
            border-radius: 9999px;
            top: 0.125rem;
            left: 0.125rem;
            transition: transform 0.2s;
        }
        .toggle-checkbox:checked::after {
            transform: translateX(1.25rem);
        }
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #8b5cf6;
            color: white;
        }
        .btn-primary:hover {
            background: #7c3aed;
        }
        .btn-secondary {
            background: #059669;
            color: white;
        }
        .btn-secondary:hover {
            background: #047857;
        }
        .btn-outline {
            background: white;
            color: #8b5cf6;
            border: 2px solid #8b5cf6;
        }
        .btn-outline:hover {
            background: #f3f4f6;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
        }
        .btn-group button {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid #d1d5db;
            background: #f9fafb;
            color: #374151;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-group button.active {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }
        .btn-group button:hover:not(.active) {
            background: #f3f4f6;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <!-- Editor View -->
    <div id="editor-view" style="display: grid; grid-template-columns: 400px 1fr; height: 100vh;">
        <!-- Editor Panel -->
        <div class="editor-panel">
            <div style="padding: 2rem;">
                <h1 style="font-size: 1.5rem; font-weight: 800; color: #111827; margin-bottom: 0.5rem;">
                    🎮 Streamer Widget Editor
                </h1>
                <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 2rem;">
                    Customize your widget below. Changes are saved automatically!
                </p>

                <form id="widget-form">
                    <!-- Basic Info Section -->
                    <div class="section-title">✨ Basic Information</div>
                    
                    <div class="field-group">
                        <label for="streamer-name">Streamer Name</label>
                        <input type="text" id="streamer-name" placeholder="Enter your name" value="GameGrrr Inari">
                    </div>

                    <div class="field-group">
                        <label for="streamer-logo">Logo URL</label>
                        <input type="text" id="streamer-logo" placeholder="https://..." value="https://images.unsplash.com/photo-1759709867188-7d94e0041de2?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400">
                        <p style="font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem;">
                            Your channel logo or branding
                        </p>
                    </div>

                    <div class="field-group">
                        <label for="streamer-picture">Profile Picture URL</label>
                        <input type="text" id="streamer-picture" placeholder="https://..." value="https://images.unsplash.com/photo-1610041321461-37a7d578ebad?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=400">
                        <p style="font-size: 0.75rem; color: #6b7280; margin-top: 0.25rem;">
                            Upload to Imgur or ImgBB and paste the link
                        </p>
                    </div>

                    <div class="field-group">
                        <label for="streamer-bio">Bio</label>
                        <textarea id="streamer-bio" rows="4" placeholder="Tell viewers about yourself">Howdy! I'm Juan Crabtree, your local Android Art Engi I used to be a weapon developed by government scientists, but since I escaped I now live a life dedicated to first person action combat games, and occasional voice acting! I am also a Christian, and I believe wholeheartedly that Jesus is Lord above all. I am married to my wonderful (and very silly) husband Big Spoon, and I am currently working full time as Streamer and Freelance VTuber Artist!</textarea>
                    </div>

                    <!-- Style Options -->
                    <div class="section-title" style="margin-top: 2rem;">🎨 Style Options</div>

                    <div class="field-group">
                        <label>Picture Position</label>
                        <div class="btn-group">
                            <button type="button" id="position-left" onclick="setPosition('left')">Left</button>
                            <button type="button" id="position-right" onclick="setPosition('right')" class="active">Right</button>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="bg-color">Background Color</label>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <input type="color" id="bg-color" value="#8b5cf6">
                            <input type="text" id="bg-color-text" value="#8b5cf6" placeholder="#8b5cf6" style="flex: 1;">
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="bg-opacity">Background Opacity: <span id="opacity-value">100</span>%</label>
                        <input type="range" id="bg-opacity" min="0" max="100" value="100">
                    </div>

                    <!-- Social Links Section -->
                    <div class="section-title" style="margin-top: 2rem;">🔗 Social Links</div>
                    
                    <div class="field-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label style="margin: 0;">Twitter</label>
                            <input type="checkbox" class="toggle-checkbox" id="toggle-twitter" checked>
                        </div>
                        <input type="text" id="social-twitter" placeholder="https://twitter.com/yourhandle" value="https://twitter.com">
                    </div>

                    <div class="field-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label style="margin: 0;">Instagram</label>
                            <input type="checkbox" class="toggle-checkbox" id="toggle-instagram" checked>
                        </div>
                        <input type="text" id="social-instagram" placeholder="https://instagram.com/yourhandle" value="https://instagram.com">
                    </div>

                    <div class="field-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label style="margin: 0;">YouTube</label>
                            <input type="checkbox" class="toggle-checkbox" id="toggle-youtube" checked>
                        </div>
                        <input type="text" id="social-youtube" placeholder="https://youtube.com/@yourchannel" value="https://youtube.com">
                    </div>

                    <div class="field-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label style="margin: 0;">Twitch</label>
                            <input type="checkbox" class="toggle-checkbox" id="toggle-twitch" checked>
                        </div>
                        <input type="text" id="social-twitch" placeholder="https://twitch.tv/yourhandle" value="https://twitch.tv">
                    </div>

                    <div class="field-group">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
                            <label style="margin: 0;">Website</label>
                            <input type="checkbox" class="toggle-checkbox" id="toggle-website" checked>
                        </div>
                        <input type="text" id="social-website" placeholder="https://yourwebsite.com" value="https://example.com">
                    </div>

                    <!-- Action Buttons -->
                    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 2px solid #e5e7eb;">
                        <button type="button" class="btn btn-outline" onclick="toggleView()">
                            👁️ Switch to Widget View
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="copyEmbedCode()">
                            📋 Copy Embed Code
                        </button>
                        <button type="button" class="btn btn-primary" onclick="downloadWidgetOnly()">
                            💾 Download Widget Only
                        </button>
                        <p style="font-size: 0.75rem; color: #6b7280; margin-top: 1rem; text-align: center;">
                            Changes are saved automatically!
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div style="padding: 3rem;">
                <div id="preview-widget"></div>
            </div>
        </div>
    </div>

    <!-- Widget Only View -->
    <div id="widget-only-view" class="widget-only-view">
        <div style="padding: 1rem; text-align: right;">
            <button onclick="toggleView()" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.875rem; font-weight: 600;">
                ⚙️ Edit Widget
            </button>
        </div>
        <div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 4rem); padding: 2rem;">
            <div id="live-widget"></div>
        </div>
    </div>

    <script>
        // SVG Icons
        const icons = {
            twitter: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>',
            instagram: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>',
            youtube: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"></path><path d="m10 15 5-3-5-3z"></path></svg>',
            twitch: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2H3v16h5v4l4-4h5l4-4V2zm-10 9V7m5 4V7"></path></svg>',
            website: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" x2="21" y1="14" y2="3"></line></svg>'
        };

        let currentPosition = 'right';

        // Set picture position
        function setPosition(position) {
            currentPosition = position;
            document.getElementById('position-left').classList.toggle('active', position === 'left');
            document.getElementById('position-right').classList.toggle('active', position === 'right');
            updatePreview();
            saveData();
        }

        // Sync color inputs
        document.getElementById('bg-color').addEventListener('input', (e) => {
            document.getElementById('bg-color-text').value = e.target.value;
            updatePreview();
            saveData();
        });

        document.getElementById('bg-color-text').addEventListener('input', (e) => {
            const value = e.target.value;
            if (/^#[0-9A-F]{6}$/i.test(value)) {
                document.getElementById('bg-color').value = value;
                updatePreview();
                saveData();
            }
        });

        // Update opacity display
        document.getElementById('bg-opacity').addEventListener('input', (e) => {
            document.getElementById('opacity-value').textContent = e.target.value;
            updatePreview();
            saveData();
        });

        // Load saved data from localStorage
        function loadSavedData() {
            const saved = localStorage.getItem('streamerWidgetDataV4');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('streamer-name').value = data.name || '';
                document.getElementById('streamer-logo').value = data.logo || '';
                document.getElementById('streamer-picture').value = data.picture || '';
                document.getElementById('streamer-bio').value = data.bio || '';
                document.getElementById('bg-color').value = data.backgroundColor || '#8b5cf6';
                document.getElementById('bg-color-text').value = data.backgroundColor || '#8b5cf6';
                document.getElementById('bg-opacity').value = data.backgroundOpacity || 100;
                document.getElementById('opacity-value').textContent = data.backgroundOpacity || 100;
                currentPosition = data.picturePosition || 'right';
                setPosition(currentPosition);
                
                if (data.socials) {
                    Object.keys(data.socials).forEach(platform => {
                        const toggle = document.getElementById(`toggle-${platform}`);
                        const input = document.getElementById(`social-${platform}`);
                        if (toggle && input && data.socials[platform]) {
                            toggle.checked = data.socials[platform].enabled;
                            input.value = data.socials[platform].url;
                        }
                    });
                }
            }
        }

        // Save data to localStorage
        function saveData() {
            const data = getWidgetData();
            localStorage.setItem('streamerWidgetDataV4', JSON.stringify({
                name: data.name,
                logo: data.logo,
                picture: data.picture,
                bio: data.bio,
                backgroundColor: document.getElementById('bg-color').value,
                backgroundOpacity: parseInt(document.getElementById('bg-opacity').value),
                picturePosition: currentPosition,
                socials: {
                    twitter: { enabled: document.getElementById('toggle-twitter').checked, url: document.getElementById('social-twitter').value },
                    instagram: { enabled: document.getElementById('toggle-instagram').checked, url: document.getElementById('social-instagram').value },
                    youtube: { enabled: document.getElementById('toggle-youtube').checked, url: document.getElementById('social-youtube').value },
                    twitch: { enabled: document.getElementById('toggle-twitch').checked, url: document.getElementById('social-twitch').value },
                    website: { enabled: document.getElementById('toggle-website').checked, url: document.getElementById('social-website').value }
                }
            }));
        }

        // Get current widget data
        function getWidgetData() {
            return {
                name: document.getElementById('streamer-name').value,
                logo: document.getElementById('streamer-logo').value,
                picture: document.getElementById('streamer-picture').value,
                bio: document.getElementById('streamer-bio').value,
                backgroundColor: document.getElementById('bg-color').value,
                backgroundOpacity: parseInt(document.getElementById('bg-opacity').value),
                picturePosition: currentPosition,
                socials: {
                    twitter: document.getElementById('toggle-twitter').checked ? document.getElementById('social-twitter').value : '',
                    instagram: document.getElementById('toggle-instagram').checked ? document.getElementById('social-instagram').value : '',
                    youtube: document.getElementById('toggle-youtube').checked ? document.getElementById('social-youtube').value : '',
                    twitch: document.getElementById('toggle-twitch').checked ? document.getElementById('social-twitch').value : '',
                    website: document.getElementById('toggle-website').checked ? document.getElementById('social-website').value : ''
                }
            };
        }

        // Convert hex to rgba
        function hexToRgba(hex, opacity) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${opacity / 100})`;
        }

        // Generate widget HTML
        function generateWidgetHTML(data) {
            const socialLinks = Object.entries(data.socials)
                .filter(([_, url]) => url)
                .map(([platform, url]) => `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="w-14 h-14 bg-white/20 hover:bg-white/30 backdrop-blur-sm rounded-xl flex items-center justify-center transition-all duration-300 hover:scale-110 group" aria-label="${platform.charAt(0).toUpperCase() + platform.slice(1)}">
                        <span class="text-white group-hover:text-white/90">${icons[platform]}</span>
                    </a>`)
                .join('\n                    ');

            const flexDirection = data.picturePosition === 'left' ? 'row' : 'row-reverse';

            return `<div class="w-full max-w-3xl mx-auto rounded-3xl shadow-2xl overflow-hidden" style="background-color: ${hexToRgba(data.backgroundColor, data.backgroundOpacity)}; border-radius: 24px; min-height: 400px;">
                <div class="p-8">
                    <!-- Logo at top, centered -->
                    <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                        <img src="${data.logo}" alt="${data.name} Logo" style="max-height: 64px; max-width: 20rem; width: auto; height: auto; object-fit: contain;" />
                    </div>
                    
                    <!-- Profile Picture + Bio side by side (horizontal frame) -->
                    <div style="display: flex; flex-direction: ${flexDirection}; align-items: flex-start; gap: 1.5rem; margin-bottom: 2rem; min-height: 150px;">
                        <div style="flex-shrink: 0;">
                            <img src="${data.picture}" alt="${data.name}" style="width: 128px; height: 128px; min-width: 128px; min-height: 128px; border-radius: 1rem; object-fit: cover; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);" />
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <p style="color: white; font-size: 1rem; line-height: 1.625; margin: 0; overflow-wrap: break-word;">
                                ${data.bio}
                            </p>
                        </div>
                    </div>
                    
                    <!-- Social links centered -->
                    <div style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;">
                        ${socialLinks}
                    </div>
                </div>
            </div>`;
        }

        // Update preview
        function updatePreview() {
            const data = getWidgetData();
            const widgetHTML = generateWidgetHTML(data);
            document.getElementById('preview-widget').innerHTML = widgetHTML;
            document.getElementById('live-widget').innerHTML = widgetHTML;
            saveData();
        }

        // Toggle between editor and widget view
        function toggleView() {
            const editorView = document.getElementById('editor-view');
            const widgetView = document.getElementById('widget-only-view');
            
            if (editorView.style.display === 'none') {
                editorView.style.display = 'grid';
                widgetView.style.display = 'none';
            } else {
                editorView.style.display = 'none';
                widgetView.style.display = 'block';
                updatePreview();
            }
        }

        // Generate standalone HTML
        function generateStandaloneHTML() {
            const data = getWidgetData();
            const socialLinks = Object.entries(data.socials)
                .filter(([_, url]) => url)
                .map(([platform, url]) => `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="w-14 h-14 bg-white/20 hover:bg-white/30 backdrop-blur-sm rounded-xl flex items-center justify-center transition-all duration-300 hover:scale-110 group" aria-label="${platform.charAt(0).toUpperCase() + platform.slice(1)}">
                        <span class="text-white group-hover:text-white/90">${icons[platform]}</span>
                    </a>`)
                .join('\n                    ');

            const flexDirection = data.picturePosition === 'left' ? 'row' : 'row-reverse';
            
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${data.name} - Streamer Widget</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111827;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-3xl mx-auto rounded-3xl shadow-2xl overflow-hidden" style="background-color: ${hexToRgba(data.backgroundColor, data.backgroundOpacity)}; border-radius: 24px; min-height: 400px;">
            <div class="p-8">
                <!-- Logo at top, centered -->
                <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
                    <img src="${data.logo}" alt="${data.name} Logo" style="max-height: 64px; max-width: 20rem; width: auto; height: auto; object-fit: contain;" />
                </div>
                
                <!-- Profile Picture + Bio side by side (horizontal frame) -->
                <div style="display: flex; flex-direction: ${flexDirection}; align-items: flex-start; gap: 1.5rem; margin-bottom: 2rem; min-height: 150px;">
                    <div style="flex-shrink: 0;">
                        <img src="${data.picture}" alt="${data.name}" style="width: 128px; height: 128px; min-width: 128px; min-height: 128px; border-radius: 1rem; object-fit: cover; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);" />
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <p style="color: white; font-size: 1rem; line-height: 1.625; margin: 0; overflow-wrap: break-word;">
                            ${data.bio}
                        </p>
                    </div>
                </div>
                
                <!-- Social links centered -->
                <div style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;">
${socialLinks}
                </div>
            </div>
        </div>
    </div>
</body>
</html>`;
        }

        // Copy embed code to clipboard
        function copyEmbedCode() {
            const html = generateStandaloneHTML();
            navigator.clipboard.writeText(html).then(() => {
                alert('✅ Embed code copied to clipboard! Paste it into your GoDaddy HTML editor.');
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('❌ Failed to copy. Please try again.');
            });
        }

        // Download widget only HTML
        function downloadWidgetOnly() {
            const data = getWidgetData();
            const html = generateStandaloneHTML();
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'streamer-widget.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Add event listeners for real-time updates
        document.getElementById('widget-form').addEventListener('input', updatePreview);
        document.getElementById('widget-form').addEventListener('change', updatePreview);

        // Load saved data and initial preview
        loadSavedData();
        updatePreview();

        // Check URL parameter to determine initial view
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('view') === 'widget') {
            toggleView();
        }
    </script>
</body>
</html>
